name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  deploy-staging:
    runs-on: ubuntu-latest
    needs: trufflehog
    if: github.ref != 'refs/heads/production'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: functions
      - name: Run tests
        run: npm test
        working-directory: functions
      - name: Authenticate to Google Cloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'
          service_account_key: ${{ secrets.GCP_SA_KEY_STAGING }}
      - name: Deploy to Firebase
        run: npm run deploy:functions:staging
        working-directory: functions


  deploy-production:
    runs-on: ubuntu-latest
    needs: trufflehog
    if: github.ref == 'refs/heads/production'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: functions
      - name: Run tests
        run: npm test
        working-directory: functions
      - name: Authenticate to Google Cloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'
          service_account_key: ${{ secrets.GCP_SA_KEY_PROD }}
      - name: Deploy to Firebase
        run: npm run deploy:functions:production
        working-directory: functions