name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd functions && npm ci
      - name: Run tests
        run: cd functions && npm test
      - name: Authenticate to Google Cloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'
          service_account_key: ${{ secrets.GCP_SA_KEY_STAGING }}
      - name: Deploy to Firebase
        run: cd functions && npx firebase deploy --only functions --project bowen-ferry-staging

  deploy-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd functions && npm ci
      - name: Run tests
        run: cd functions && npm test
      - name: Authenticate to Google Cloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'
          service_account_key: ${{ secrets.GCP_SA_KEY_PROD }}
      - name: Deploy to Firebase
        run: cd functions && npx firebase deploy --only functions --project bowen-ferry