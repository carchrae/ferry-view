[build]
  command = "pnpm build"
  publish = "dist/pwa"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/*"
  to = "https://bowenferry.ca/Production/:splat"
  status = 200
  force = true

# NOTE: do not add [[context.<name>.redirects]] blocks here — Netlify
# silently ignores context-scoped redirects (only build settings/environment
# are context-aware). The per-context /webcam/* proxy is instead generated
# into dist/pwa/_redirects at build time by
# scripts/generate-netlify-redirects.mjs, keyed off PRODUCTION below.
[context.production]
  environment = { PRODUCTION = "true" }
